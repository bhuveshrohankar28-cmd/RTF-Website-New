name: Smart Assign

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign:
    if: contains(github.event.comment.body, '/assign')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment.body;
            const commenter = context.payload.comment.user.login;

            // Check if already assigned
            if (issue.assignees.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `⚠️ This issue is already assigned to @${issue.assignees[0].login}`
              });
              return;
            }

            // Extract mentioned user (/assign @user)
            const mentionMatch = comment.match(/@([a-zA-Z0-9-]+)/);
            const assignee = mentionMatch ? mentionMatch[1] : commenter;

            // Assign
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: issue.number,
              assignees: [assignee],
            });

            // Add label
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: issue.number,
              labels: ['in-progress'],
            });

            // Add expiry comment
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + 5);

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ Assigned to @${assignee} until ${expiry.toDateString()}`
            });